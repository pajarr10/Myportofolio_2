<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    color: white;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;

    background:
        linear-gradient(
            rgba(0,0,0,.75),
            rgba(0,0,0,.75)
        ),
        url("https://c.termai.cc/i165/DxDc.jpg");

    background-size: cover;
    background-position: center;
}

.back-real {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(255,255,255,0.08);
    color: white;
    padding: 10px 18px;
    border-radius: 14px;
    text-decoration: none;
    font-size: 14px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    transition: .2s;
}

.back-real:hover {
    background: rgba(255,255,255,0.15);
}

.container {
    text-align: center;
    animation: pop .6s ease;
}

h1 {
    font-size: 100px;
    margin: 0;
    font-weight: 900;
    letter-spacing: -6px;
}

p {
    font-size: 22px;
    line-height: 1.5;
    color: #aaa;
    margin: 10px 0 25px;
    font-weight: 700;
}

img {
    width: 260px;
    max-width: 80%;
    border-radius: 22px;
    box-shadow: 0 20px 50px rgba(0,0,0,.5);
}

button {
    margin-top: 28px;
    padding: 13px 32px;
    border: none;
    border-radius: 14px;
    background: white;
    color: black;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: .2s;
}

button:hover {
    transform: scale(1.06);
}

@keyframes pop {
    from {
        opacity: 0;
        transform: scale(.85);
    }

    to {
        opacity: 1;
        transform: scale(1);
    }
}
</style>

</head>

<body>

<a class="back-real" href="/">
    ← bek
</a>

<div class="container">

    <h1>404</h1>

    <p>
        wahhh<br>
        si bro ngapain?🗿😈
    </p>

    <img src="https://c.termai.cc/i165/DxDc.jpg">

    <br>

    <button onclick="location.href='https://hellocloud.my.id'">
        ← back
    </button>

</div>

</body>
</html>
