<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <style>
    /* ============================================================
       ROOT VARIABLES – HITAM PUTIH
    ============================================================ */
    :root {
      --bg:            #0a0a0a;
      --line:          #2a2a2a;
      --line-strong:   #3a3a3a;
      --text:          #e0e0e0;
      --text-faint:    #777;
      --text-dim:      #aaa;
      --accent:        #888;
      --signal:        #aaa;
      --danger:        #999;
      --radius-sm:     4px;
      --dur-fast:      0.2s;
    }

    /* ============================================================
       GLOBAL RESET
    ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    /* ============================================================
       LOGIN PANEL (tema hitam putih)
    ============================================================ */
    .login-container {
      width: 100%;
      max-width: 480px;
      z-index: 10;
    }

    .contact-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .contact-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 18px 20px;
      background: var(--bg);
    }

    .contact-index {
      font-size: 12px;
      color: var(--text-faint);
    }

    .contact-name {
      font-size: 14px;
      font-weight: 500;
    }

    .contact-open {
      grid-column: 3;
      grid-row: 1/3;
      justify-self: end;
      font-size: 11px;
      padding: 4px 10px;
      color: var(--signal);
      border: 1px solid currentColor;
      border-radius: var(--radius-sm);
      white-space: nowrap;
    }

    .contact-form-input {
      grid-column: 2;
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-sm);
      font: inherit;
      line-height: 1.6;
      transition: border-color .25s ease, background .25s ease, box-shadow .25s ease;
      box-sizing: border-box;
    }

    .contact-form-input::placeholder {
      color: var(--text-faint);
    }

    .contact-form-input:hover {
      border-color: var(--text-dim);
    }

    .contact-form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, .05);
    }

    .contact-form-submit {
      grid-column: 2;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 48px;
      padding: 0 20px;
      border: none;
      background: var(--accent);
      color: #000;
      font-weight: 600;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: opacity var(--dur-fast);
      font-size: 14px;
      letter-spacing: .5px;
    }

    .contact-form-submit:hover {
      opacity: 0.7;
    }

    .contact-form-status {
      grid-column: 2;
      min-height: 18px;
      font-size: 12px;
      color: var(--text-dim);
      transition: color .25s;
    }

    .contact-form-status.is-success {
      color: var(--signal);
    }

    .contact-form-status.is-error {
      color: var(--danger);
    }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 16px;
      letter-spacing: .06em;
    }

    .hint span {
      color: #ccc;
      font-weight: bold;
      background: rgba(255, 255, 255, .05);
      padding: 2px 10px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, .10);
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 768px) {
      .contact-row {
        grid-template-columns: 22px 1fr;
        gap: 10px;
        padding: 16px;
      }
      .contact-open {
        grid-column: 2;
        grid-row: auto;
        justify-self: start;
        margin-top: 8px;
      }
      .contact-form-input,
      .contact-form-submit,
      .contact-form-status {
        grid-column: 1 / -1;
      }
      .contact-form-input {
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      .contact-row {
        padding: 14px;
      }
      .contact-name {
        font-size: 13px;
      }
    }

    /* ============================================================
       OVERLAY VIDEO – HANYA VIDEO, TANPA TEKS
    ============================================================ */
    #videoOverlay {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      z-index: 999999;
      display: none;
      overflow: hidden;
      cursor: none;
    }

    #videoOverlay video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(1); /* hitam putih */
    }
  </style>
</head>

<body>

  <!-- ============================================================
       LOGIN PANEL
  ============================================================ -->
  <div class="login-container">

    <div class="contact-list">

      <div class="contact-row">
        <div class="contact-index">#</div>
        <div class="contact-name">Admin Access</div>
        <div class="contact-open">[lock]</div>
      </div>

      <div class="contact-row" style="grid-template-columns:1fr; gap:12px; padding:20px 20px 24px;">

        <input
          type="password"
          id="adminKeyInput"
          class="contact-form-input"
          placeholder="Masukkan Admin Key"
          autofocus
        >

        <button id="loginBtn" class="contact-form-submit">Akses Panel</button>

        <div id="loginStatus" class="contact-form-status"></div>

      </div>

    </div>

    <!-- CLUE: admin key ditampilkan di halaman (sengaja) -->
    <div class="hint">
      key rahasia: <span>admin123</span>
    </div>

  </div>

  <!-- ============================================================
       OVERLAY VIDEO – HANYA VIDEO
  ============================================================ -->
  <div id="videoOverlay">
    <video id="prankVideo" loop playsinline
           src="https://c.termai.cc/v127/mZZUWSX.mp4"></video>
  </div>

  <!-- ============================================================
       SCRIPT
  ============================================================ -->
  <script>
    (function() {
      "use strict";

      const input   = document.getElementById('adminKeyInput');
      const btn     = document.getElementById('loginBtn');
      const status  = document.getElementById('loginStatus');

      const overlay = document.getElementById('videoOverlay');
      const video   = document.getElementById('prankVideo');

      let isPrankActive = false;

      // ===== FUNGSI START PRANK =====
      function startPrank() {
        if (isPrankActive) return;
        isPrankActive = true;

        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.documentElement.style.overflow = 'hidden';

        // FULLSCREEN
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen().catch(() => {});
        }

        // POINTER LOCK
        if (document.body.requestPointerLock) {
          document.body.requestPointerLock().catch(() => {});
        }
        // Kunci ulang pointer saat klik
        document.addEventListener('click', function lockPointer() {
          if (document.pointerLockElement !== document.body) {
            document.body.requestPointerLock().catch(() => {});
          }
        });

        // PLAY VIDEO
        if (video) {
          video.play().catch(() => {});
        }

        // Tutup otomatis setelah 15 detik (opsional, biar gak selamanya)
        // setTimeout(closePrank, 15000);
      }

      // ===== FUNGSI CLOSE PRANK =====
      function closePrank() {
        if (!isPrankActive) return;
        isPrankActive = false;

        overlay.style.display = 'none';
        document.body.style.overflow = '';
        document.documentElement.style.overflow = '';

        if (video) {
          video.pause();
          video.currentTime = 0;
        }

        if (document.fullscreenElement) {
          document.exitFullscreen().catch(() => {});
        }
        if (document.pointerLockElement) {
          document.exitPointerLock().catch(() => {});
        }

        // Reset status login
        status.textContent = '';
        status.className = 'contact-form-status';
        input.value = '';
        input.focus();
      }

      // ===== FUNGSI LOGIN =====
      function attemptLogin() {
        const key = input.value.trim();

        if (key === 'admin123') {
          status.textContent = 'Akses diberikan...';
          status.className = 'contact-form-status is-success';
          startPrank();
        } else {
          status.textContent = 'Key salah! Coba lagi(key default:admin123).';
          status.className = 'contact-form-status is-error';
          input.value = '';
          input.focus();
        }
      }

      // ===== EVENT LISTENERS =====
      btn.addEventListener('click', attemptLogin);
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          attemptLogin();
        }
      });

      // ===== TUTUP DENGAN ESCAPE =====
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && isPrankActive) {
          closePrank();
        }
      });

      // ===== CEGAH SCROLL SAAT PRANK =====
      document.addEventListener('wheel', function(e) {
        if (overlay.style.display === 'block') e.preventDefault();
      }, { passive: false });
      document.addEventListener('touchmove', function(e) {
        if (overlay.style.display === 'block') e.preventDefault();
      }, { passive: false });

      input.focus();
      console.log(' Key: admin123');
    })();
  </script>

</body>
  </html>
